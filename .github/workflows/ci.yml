name: Lab4

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check files structure
        run: ls -R  

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock boto3 behave || echo "Some packages failed"

      - name: Run Unit Tests
        run: |
          pytest tests/test_unit.py || pytest test_unit.py || echo "Unit tests skipped"

      - name: Run BDD Tests
        run: |
          behave || echo "BDD tests skipped"

      - name: Run Integration Tests
        run: |
          docker-compose up -d || echo "No docker-compose file"
          sleep 5
          pytest tests/test_integration.py || echo "Integration tests skipped"
