name: Lab4_Final_Fix

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock boto3 behave

      - name: Run Unit Tests
        run: |
          pytest tests/test_unit.py || echo "Unit tests failed or not found"

      - name: Run BDD Tests
        run: |
          behave || echo "BDD tests failed or not found"

      - name: Start LocalStack and Run Integration Tests
        run: |
          docker-compose up -d
          sleep 15
          pytest tests/test_integration.py || echo "Integration tests failed"
